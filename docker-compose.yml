services:
  amnezia-panel:
    build: .
    container_name: amnezia-panel
    restart: unless-stopped
    ports:
      - "${PANEL_PORT:-54325}:54325"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - PANEL_PORT=54325
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:54325/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # Container starts as root (for chown on mounted data/),
    # then drops to paneluser via docker-entrypoint.sh
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    read_only: false
