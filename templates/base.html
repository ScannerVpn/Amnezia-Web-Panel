<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Amnezia Panel{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>" />
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">🛡️</span>
        <div>
          <div class="logo-title">Amnezia Panel</div>
          <div class="logo-version">v{{ version }}</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="/" class="nav-item {% if request.url.path == '/' %}active{% endif %}">
          <span class="nav-icon">📊</span> داشبورد
        </a>
        <a href="/settings" class="nav-item {% if request.url.path == '/settings' %}active{% endif %}">
          <span class="nav-icon">⚙️</span> تنظیمات
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="/logout" class="btn-logout">خروج از حساب</a>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Global modals -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()"></div>
  <div id="modal-container"></div>

  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
